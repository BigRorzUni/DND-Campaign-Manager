{% extends "base.html" %}

{% block title %}Session{% endblock %}

{% block content %}

<div id="session-page" data-session-id="{{ session_id }}">

<section class="card">
    <h2 id="session-title">Session</h2>
    <p id="session-date" class="muted"></p>
    <p id="session-notes" class="muted"></p>
</section>

<section class="card">
    <h2>Encounters</h2>

    <div id="encounters"></div>

    <h3 id="encounter-form-heading">Create Encounter</h3>
    
    <form id="encounter-form">
        <input type="hidden" id="encounter-id" />

        <input id="encounter-name-input" placeholder="Encounter name" required />
        <input id="encounter-expected-difficulty" placeholder="Expected difficulty" />
        <textarea id="encounter-notes-input" placeholder="Encounter notes"></textarea>

        <label style="display:block; margin:8px 0;">
            <input id="encounter-is-simulated" type="checkbox" />
            Simulated encounter
        </label>

        <button type="submit" id="encounter-submit-btn">Create Encounter</button>
        <button type="button" id="encounter-cancel-btn" style="display:none;">Cancel Edit</button>
    </form>

</section>

</div>

<script>

const sessionId = Number(
    document.getElementById("session-page").dataset.sessionId
);

let encountersCache = [];
let editingEncounterId = null;

async function api(path, options = {}) {

    const response = await fetch(path, {
        headers: { "Content-Type": "application/json" },
        ...options
    });

    if (!response.ok) {
        let detail = "Request failed";
        try {
            const data = await response.json();
            detail = data.detail || JSON.stringify(data);
        } catch (_) {}
        throw new Error(detail);
    }

    if (response.status === 204) return null;

    return response.json();
}

async function loadSession() {

    const session = await api(`/api/v1/sessions/${sessionId}`);

    document.getElementById("session-title").textContent =
        session.title || "Untitled Session";

    document.getElementById("session-date").textContent =
        session.date;

    document.getElementById("session-notes").textContent =
        session.notes || "";

}

function escapeHtml(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

async function loadEncounters() {

    const encounters =
        await api(`/api/v1/sessions/${sessionId}/encounters`);

    encountersCache = encounters;

    const container = document.getElementById("encounters");

    container.innerHTML = "";

    if (!encounters.length) {

        container.innerHTML =
            "<p class='muted'>No encounters yet.</p>";

        return;
    }

    for (const e of encounters) {

        const div = document.createElement("div");

        div.className = "item";

        const simulationText = e.is_simulated
            ? `Simulated | ${escapeHtml(e.simulation_status || "PENDING")}`
            : "Normal encounter";

        div.innerHTML = `
            <strong>${escapeHtml(e.name)}</strong><br>
            <span class="muted">
                ${e.expected_difficulty ? escapeHtml(e.expected_difficulty) : "No difficulty set"}
                ${e.rounds !== null && e.rounds !== undefined ? ` | Rounds: ${escapeHtml(e.rounds)}` : ""}
            </span><br>
            <span class="muted">${escapeHtml(simulationText)}</span><br>
            ${e.winner ? `<span class="muted">Winner: ${escapeHtml(e.winner)}</span><br>` : ""}
            <span class="muted">${escapeHtml(e.notes || "")}</span><br>
            <a href="/encounters/${e.id}/view">Open Encounter</a><br>
            <button type="button" onclick="startEditEncounter(${e.id})">Edit</button>
            <button type="button" onclick="deleteEncounter(${e.id})">Delete</button>
        `;

        container.appendChild(div);
    }
}

function startEditEncounter(encounterId) {
    const encounter = encountersCache.find(e => e.id === encounterId);
    if (!encounter) return;

    editingEncounterId = encounter.id;

    document.getElementById("encounter-id").value = encounter.id;
    document.getElementById("encounter-name-input").value = encounter.name || "";
    document.getElementById("encounter-expected-difficulty").value = encounter.expected_difficulty || "";
    document.getElementById("encounter-notes-input").value = encounter.notes || "";
    document.getElementById("encounter-is-simulated").checked = !!encounter.is_simulated;

    document.getElementById("encounter-form-heading").textContent = "Edit Encounter";
    document.getElementById("encounter-submit-btn").textContent = "Save Changes";
    document.getElementById("encounter-cancel-btn").style.display = "inline-block";
}

function resetEncounterForm() {
    editingEncounterId = null;

    document.getElementById("encounter-form").reset();
    document.getElementById("encounter-id").value = "";
    document.getElementById("encounter-is-simulated").checked = false;

    document.getElementById("encounter-form-heading").textContent = "Create Encounter";
    document.getElementById("encounter-submit-btn").textContent = "Create Encounter";
    document.getElementById("encounter-cancel-btn").style.display = "none";
}

async function deleteEncounter(encounterId) {
    const e = encountersCache.find(en => en.id === encounterId);
    const encounterLabel = e?.name || `encounter ${encounterId}`;

    if (!confirm(`Delete ${encounterLabel}?`)) {
        return;
    }

    try {
        await api(`/api/v1/encounters/${encounterId}`, {
            method: "DELETE"
        });

        if (editingEncounterId === encounterId) {
            resetEncounterForm();
        }

        await loadEncounters();
    } catch (err) {
        alert(err.message);
    }
}

document.getElementById("encounter-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const payload = {
        name: document.getElementById("encounter-name-input").value,
        expected_difficulty: document.getElementById("encounter-expected-difficulty").value || null,
        notes: document.getElementById("encounter-notes-input").value || null,
        is_simulated: document.getElementById("encounter-is-simulated").checked
    };

    try {
        if (editingEncounterId) {
            await api(`/api/v1/encounters/${editingEncounterId}`, {
                method: "PUT",
                body: JSON.stringify(payload)
            });
        } else {
            await api(`/api/v1/sessions/${sessionId}/encounters`, {
                method: "POST",
                body: JSON.stringify(payload)
            });
        }

        resetEncounterForm();
        await loadEncounters();
    } catch (err) {
        alert(err.message);
    }
});

document
.getElementById("encounter-cancel-btn")
.addEventListener("click", resetEncounterForm);

async function init() {
    await loadSession();
    await loadEncounters();
}

init();

</script>

{% endblock %}
