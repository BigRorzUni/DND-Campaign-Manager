<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}DnD Campaign Manager{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div class="container">
        <header class="topbar">
            <div>
                <h1>DnD Campaign Manager</h1>
                <p class="muted">DM dashboard for campaigns, sessions, encounters, and events.</p>
            </div>
            <nav class="topbar-links">
                <a href="/">Home</a>
                <a href="/docs">Swagger</a>
                <a href="/redoc">ReDoc</a>
                <a href="#" id="health-check-link">Health</a>

                <script>
                document.getElementById("health-check-link").addEventListener("click", async (e) => {
                    e.preventDefault();
                    try {
                        const response = await fetch("/health");
                        const data = await response.json();
                        alert(`Health status: ${data.status}`);
                    } catch (err) {
                        alert("Health check failed.");
                    }
                });
                </script>
            </nav>
        </header>

        {% block content %}{% endblock %}
    </div>
</body>
</html>
