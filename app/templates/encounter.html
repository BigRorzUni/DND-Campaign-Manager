{% extends "base.html" %}

{% block title %}Encounter{% endblock %}

{% block content %}

<div id="encounter-page" data-encounter-id="{{ encounter_id }}">

    <section class="card">
        <h2 id="encounter-name">Encounter</h2>
        <p id="encounter-difficulty" class="muted"></p>
        <p id="encounter-rounds" class="muted"></p>
        <p id="encounter-notes" class="muted"></p>
    </section>

    <section class="card">
        <h2>Encounter Review</h2>

        <div id="encounter-review">
            <p class="muted"><strong>Intended Difficulty:</strong> <span id="review-expected">Loading...</span></p>
            <p class="muted"><strong>Observed Outcome:</strong> <span id="review-observed">Loading...</span></p>
            <p class="muted"><strong>Assessment:</strong> <span id="review-assessment">Loading...</span></p>
            <p class="muted"><strong>Notes:</strong> <span id="review-notes">Loading...</span></p>
        </div>
    </section>


    <section class="card">
        <h2>Events</h2>
        <div id="events"></div>

        <h3>Create Event</h3>
        <form id="event-form">
            <input id="event-kind" placeholder="DAMAGE / HEAL / SPELL / DOWN" required />
            <input id="event-source" placeholder="Source" />
            <input id="event-target" placeholder="Target" />
            <input id="event-amount" type="number" placeholder="Amount" />
            <textarea id="event-detail" placeholder="Detail"></textarea>
            <button>Create Event</button>
        </form>
    </section>

</div>

<script>
const encounterId = Number(
    document.getElementById("encounter-page").dataset.encounterId
);

async function api(path, options = {}) {
    const response = await fetch(path, {
        headers: { "Content-Type": "application/json" },
        ...options
    });

    if (!response.ok) {
        let detail = "Request failed";
        try {
            const data = await response.json();
            detail = data.detail || JSON.stringify(data);
        } catch (_) {}
        throw new Error(detail);
    }

    if (response.status === 204) return null;
    return response.json();
}

async function loadEncounter() {
    const encounter = await api(`/api/v1/encounters/${encounterId}`);

    document.getElementById("encounter-name").textContent =
        encounter.name || "Untitled Encounter";

    document.getElementById("encounter-difficulty").textContent =
        encounter.expected_difficulty
            ? `Expected difficulty: ${encounter.expected_difficulty}`
            : "Expected difficulty not set.";

    document.getElementById("encounter-rounds").textContent =
        encounter.rounds !== null && encounter.rounds !== undefined
            ? `Rounds: ${encounter.rounds}`
            : "Rounds not recorded.";

    document.getElementById("encounter-notes").textContent =
        encounter.notes || "";

    const expectedDifficultyText =
        encounter.expected_difficulty || "Not set";

    const reviewExpected = document.getElementById("review-expected");
    if (reviewExpected) {
        reviewExpected.textContent = expectedDifficultyText;
    }
}

async function loadEvents() {
    const events = await api(`/api/v1/encounters/${encounterId}/events`);
    const container = document.getElementById("events");
    container.innerHTML = "";

    if (!events.length) {
        container.innerHTML = "<p class='muted'>No events yet.</p>";
        return;
    }

    for (const e of events) {
        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <strong>${e.kind}</strong><br>
            <span class="muted">
                ${e.source || "Unknown"} → ${e.target || "Unknown"}
                ${e.amount !== null && e.amount !== undefined ? ` | ${e.amount}` : ""}
            </span><br>
            <span class="muted">${e.detail || ""}</span>
        `;

        container.appendChild(div);
    }
}

async function loadEncounterReview() {
    const review = await api(`/api/v1/encounters/${encounterId}/review`);

    document.getElementById("review-expected").textContent =
        review.expected_difficulty || "Not set";

    document.getElementById("review-observed").textContent =
        review.observed_outcome;

    document.getElementById("review-assessment").textContent =
        review.assessment;

    document.getElementById("review-notes").textContent =
        review.notes;
}

document.getElementById("event-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    await api(`/api/v1/encounters/${encounterId}/events`, {
        method: "POST",
        body: JSON.stringify({
            kind: document.getElementById("event-kind").value,
            source: document.getElementById("event-source").value || null,
            target: document.getElementById("event-target").value || null,
            amount: document.getElementById("event-amount").value
                ? Number(document.getElementById("event-amount").value)
                : null,
            detail: document.getElementById("event-detail").value || null
        })
    });

    e.target.reset();
    await loadEvents();
    await loadEncounterReview();
});

async function init() {
    await loadEncounter();
    await loadEvents();
    await loadEncounterReview();
}

init();
</script>

{% endblock %}
